kind = "web"
previewPath = "/"
title = "Nooki - Совместный Календарь"
version = "1.0.0"
id = "artifacts/nooki-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21140

[services.development]
run = "pnpm --filter @workspace/nooki-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nooki-landing", "run", "build" ]
publicDir = "artifacts/nooki-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21140"
BASE_PATH = "/"
